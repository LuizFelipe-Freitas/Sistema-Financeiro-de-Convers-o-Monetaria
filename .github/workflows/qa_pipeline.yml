name: Automação de QA - Fintech API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write


jobs:

  testes-api:

    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4


      - name: 🐍 Setup do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip


      - name: 📦 Instalação das Dependências
        working-directory: "Backend QA"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt


      - name: 🧪 Execução dos Testes
        working-directory: "Backend QA"
        run: |
          mkdir -p reports
          pytest -n auto --html=reports/relatorio.html --self-contained-html


      - name: 📂 Preparar Dashboard
        if: always()
        run: |
          mkdir -p public
          cp "Backend QA/reports/relatorio.html" public/index.html


      - name: 💾 Salvar Artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-testes-html
          path: public/index.html


      - name: 🚀 Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false